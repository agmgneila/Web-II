services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/bildyapp
    depends_on:
      mongo:
        condition: service_healthy
  mongo:
    image: mongo:8
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  mongodb_data:
