name: Tests
on:
  push:
    paths:
      - "practicas/final/**"
  pull_request:
    paths:
      - "practicas/final/**"
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: practicas/final
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: practicas/final/package-lock.json
      - run: npm ci
      - run: npm test
