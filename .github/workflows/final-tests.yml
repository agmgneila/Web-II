name: Práctica final
on:
  push:
    paths:
      - "practicas/final/**"
      - ".github/workflows/final-tests.yml"
  pull_request:
    paths:
      - "practicas/final/**"
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: practicas/final
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: practicas/final/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
